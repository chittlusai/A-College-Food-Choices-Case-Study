<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Choices - Professional Dashboard</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f5fa;
            overflow-x: hidden;
        }
        .header {
            background: rgba(40, 58, 74, 1);
            padding: 15px 0;
            box-shadow: 0px 2px 15px rgba(0, 0, 0, 0.1);
        }
        .navbar-brand h1 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin: 0;
        }
        .hero {
            background: linear-gradient(135deg, #0f2027, #2c5364);
            color: white;
            padding: 40px 0;
            text-align: center;
        }
        .dashboard-container {
            margin-top: -50px;
            padding: 0 15px;
        }
        .dashboard-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.1);
        }
        iframe {
            width: 100%;
            height: 900px;
            border: none;
            display: block;
        }
    </style>
</head>

<body>

    <!-- Top Navigation Bar - Cleaned Version -->
    <header class="header sticky-top">
        <div class="container-fluid px-4 d-flex align-items-center justify-content-between">
            <a href="#" class="navbar-brand text-decoration-none">
                <!-- Icon and extra text removed -->
                <h1>Food Choice Analysis Dashboard</h1>
            </a>
            <!-- Project Lead text removed here -->
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Dietary Patterns & Health Analysis</h1>
            <p>A comprehensive visual study of college students' food choices</p>
        </div>
    </section>

    <main class="container-fluid dashboard-container">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-11">
                <div class="dashboard-card">
                    <iframe src="https://public.tableau.com/views/fixed2_17833555439420/Dashboard1?:showVizHome=no&:embed=true&:toolbar=no" 
                            allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-muted">
        <small>&copy; 2026 Data Analytics Case Study | Built with Flask & Tableau</small>
    </footer>

</html>
